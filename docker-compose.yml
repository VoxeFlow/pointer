services:
  pointer-postgres:
    image: postgres:16-alpine
    container_name: pointer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pointer_db
      POSTGRES_USER: pointer_user
      POSTGRES_PASSWORD: pointer_password
    ports:
      - "5432:5432"
    volumes:
      - pointer_postgres_data:/var/lib/postgresql/data

volumes:
  pointer_postgres_data:
